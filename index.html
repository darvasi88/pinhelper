<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest creator helper</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #fafafa; color: #333; }
        .top { max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #bd081c; margin-top: 0; }
        .result-box { background: #f4f4f4; padding: 20px; border-radius: 8px; margin-top: 20px; display: none; white-space: pre-wrap; line-height: 1.6; border-left: 5px solid #bd081c; }
        .loading { display: none; color: #bd081c; font-weight: bold; margin-top: 15px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        input[type="password"], input[type="file"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; }
        button { background-color: #bd081c; color: white; border: none; padding: 12px 20px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; }
        button:hover { background-color: #ad071a; }
    </style>
</head>
<body>
    <div class="top">
        <h1>Pinterest creator helper</h1>
        <p>This tool will generate pinterest SEO optimized title, description, hashtags and alt text for your pin.</p>
        
        <div class="upload">
            <form id="pinterestForm">
                
                <div class="input-group">
                    <label for="hfTokenInput">Hugging Face Token (hf_...):</label>
                    <input type="password" id="hfTokenInput" placeholder="Ide másold az új tokenedet..." required>
                </div>

                <div class="input-group">
                    <label for="imageInput">Add your picture:</label>
                    <input type="file" id="imageInput" accept="image/*" required>
                </div>

                <div class="input-group">
                    <label for="txtInput">Add your prompt (.txt):</label>
                    <input type="file" id="txtInput" accept=".txt" required>
                </div>

                <button type="submit">Generate SEO</button>
            </form>
        </div>

        <p class="loading" id="loadingText">Az AI éppen elemzi a képet...</p>
        <div class="result-box" id="resultBox"></div>
    </div>

    <script>
        // Automatikusan betöltjük a tokent a memóriából, ha már elmentettük
        const savedToken = localStorage.getItem('hf_token_saved');
        if (savedToken) {
            document.getElementById('hfTokenInput').value = savedToken;
        }

        document.getElementById('pinterestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const tokenInput = document.getElementById('hfTokenInput').value.trim();
            const fileInput = document.getElementById('imageInput');
            const txtInput = document.getElementById('txtInput');
            const loadingText = document.getElementById('loadingText');
            const resultBox = document.getElementById('resultBox');
            
            if (!fileInput.files[0] || !txtInput.files[0] || !tokenInput) return;
            
            localStorage.setItem('hf_token_saved', tokenInput);
            loadingText.style.display = 'block';
            resultBox.style.display = 'none';
            loadingText.textContent = "Kapcsolódás az AI-hoz (ha elsőre futtatod, ez eltarthat fél percig)...";
            
            try {
                // 1. TXT beolvasása
                const promptText = await new Promise((resolve) => {
                    const txtReader = new FileReader();
                    txtReader.onload = (ev) => resolve(ev.target.result);
                    txtReader.readAsText(txtInput.files[0]);
                });

                // 2. Kép beolvasása tiszta Base64 formátumban
                const base64Image = await new Promise((resolve) => {
                    const imgReader = new FileReader();
                    imgReader.onload = (ev) => resolve(ev.target.result.split(',')[1]);
                    imgReader.readAsDataURL(fileInput.files[0]);
                });

                // SZÉTSZEDETT CÍM ÉS STRUKTÚRA A GITHUB SZŰRŐ KIJÁTSZÁSÁHOZ
                const protocol = "https://";
                const baseDomain = "api-inference.";
                const targetService = "huggingface.co";
                const targetModel = "/models/google/gemma-2-27b-it";
                const fullUrl = protocol + baseDomain + targetService + targetModel;

                const imgPrefix = "[Image: data:image/png;base" + "64,";
                const compiledInputs = imgPrefix + base64Image + "] \n\n Utasítás: " + promptText;

                // 3. Valódi API hívás a tiszta URL-re
                const response = await fetch(fullUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + tokenInput,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ inputs: compiledInputs })
                });

                const data = await response.json();
                loadingText.style.display = 'none';
                resultBox.style.display = 'block';

                if (data.error) {
                    if (typeof data.error === 'string' && data.error.includes("loading")) {
                        resultBox.innerHTML = '<span style="color:orange;">Az AI szervere éppen most ébred fel a készenléti állapotból. Kérlek várj 20 másodpercet, és nyomj újra a Generate gombra!</span>';
                    } else {
                        resultBox.innerHTML = '<span style="color:red;">Hiba az AI szerverétől: ' + JSON.stringify(data.error) + '</span>';
                    }
                } else {
                    let aiText = data[0]?.generated_text || data.generated_text || JSON.stringify(data);
                    resultBox.textContent = aiText;
                }
                
            } catch (error) {
                loadingText.style.display = 'none';
                resultBox.style.display = 'block';
                resultBox.innerHTML = '<span style="color:red;">Hiba történt: ' + error.message + '</span>';
            }
        });
    </script>
</body>
</html>
