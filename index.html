<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ezacim</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .top { max-width: 600px; margin: 0 auto; }
        .result-box { background: #f4f4f4; padding: 20px; border-radius: 8px; margin-top: 20px; display: none; white-space: pre-wrap; line-height: 1.6; }
        .loading { display: none; color: blue; font-weight: bold; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="top">
        <h1>Nagy cim</h1>
        <p>This tool will generate pinterest SEO optimized title, description, hashtags and alt text for your pin.</p>
        <div class="upload">
            <form id="pinterestForm">
                
                <div class="input-group">
                    <label for="imageInput">Add your picture:</label>
                    <input type="file" id="imageInput" accept="image/*" required>
                </div>

                <div class="input-group">
                    <label for="txtInput">Add your prompt (.txt):</label>
                    <input type="file" id="txtInput" accept=".txt" required>
                </div>

                <button type="submit">Generate SEO</button>
            </form>
        </div>

        <p class="loading" id="loadingText">Az AI éppen elemzi a képet a promptod alapján, kérlek várj...</p>
        <div class="result-box" id="resultBox"></div>
    </div>

    <script>
        // IDE MÁSOLD BE AZ INGYENES HUGGING FACE TOKENEDET!
        const HF_TOKEN = "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";

        document.getElementById('pinterestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fileInput = document.getElementById('imageInput');
            const txtInput = document.getElementById('txtInput');
            const loadingText = document.getElementById('loadingText');
            const resultBox = document.getElementById('resultBox');
            
            if (!fileInput.files[0] || !txtInput.files[0]) return;
            
            loadingText.style.display = 'block';
            resultBox.style.display = 'none';
            
            try {
                // 1. BEOLVASSUK A TXT FÁJL TARTALMÁT (A PROMPTOT)
                const promptText = await new Promise((resolve) => {
                    const txtReader = new FileReader();
                    txtReader.onload = (e) => resolve(e.target.result);
                    txtReader.readAsText(txtInput.files[0]);
                });

                // 2. BEOLVASSUK A KÉPET BASE64 FORMÁTUMBAN
                const base64Image = await new Promise((resolve) => {
                    const imgReader = new FileReader();
                    imgReader.onload = (e) => resolve(e.target.result);
                    imgReader.readAsDataURL(fileInput.files[0]);
                });

                console.log("Küldés az AI-nak a megadott prompttal...");

                // 3. MEGHÍVJUK A MODELLT
                const response = await fetch('https://api-inference.huggingface.co/models/xtuner/llava-llama-3-8b-v1_1-int4', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${HF_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        inputs: base64Image,
                        parameters: {
                            prompt: promptText // Itt adjuk át a TXT-ből beolvasott szöveget
                        }
                    })
                });

                const data = await response.json();
                
                loadingText.style.display = 'none';
                resultBox.style.display = 'block';

                if (data.error) {
                    resultBox.innerHTML = `<span style="color:red;">Hiba történt: ${data.error}</span>`;
                } else {
                    const aiText = data[0]?.generated_text || JSON.stringify(data);
                    resultBox.textContent = aiText;
                }
                
            } catch (error) {
                loadingText.style.display = 'none';
                resultBox.style.display = 'block';
                resultBox.innerHTML = `<span style="color:red;">Hiba a folyamat során: ${error.message}</span>`;
            }
        });
    </script>
</body>
</html>
