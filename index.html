<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest creator helper</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .top { max-width: 600px; margin: 0 auto; }
        .result-box { background: #f4f4f4; padding: 20px; border-radius: 8px; margin-top: 20px; display: none; white-space: pre-wrap; line-height: 1.6; }
        .loading { display: none; color: blue; font-weight: bold; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="password"] { width: 100%; padding: 8px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="top">
        <h1>Pinterest creator helper</h1>
        <p>This tool will generate pinterest SEO optimized title, description, hashtags and alt text for your pin.</p>
        
        <div class="upload">
            <form id="pinterestForm">
                
                <div class="input-group">
                    <label for="hfTokenInput">Hugging Face Token (hf_...):</label>
                    <input type="password" id="hfTokenInput" placeholder="Ide másold az új tokenedet..." required>
                </div>

                <div class="input-group">
                    <label for="imageInput">Add your picture:</label>
                    <input type="file" id="imageInput" accept="image/*" required>
                </div>

                <div class="input-group">
                    <label for="txtInput">Add your prompt (.txt):</label>
                    <input type="file" id="txtInput" accept=".txt" required>
                </div>

                <button type="submit">Generate SEO</button>
            </form>
        </div>

        <p class="loading" id="loadingText">Az AI éppen elemzi a képet a promptod alapján, kérlek várj...</p>
        <div class="result-box" id="resultBox"></div>
    </div>

    <script>
        const savedToken = localStorage.getItem('hf_token_saved');
        if (savedToken) {
            document.getElementById('hfTokenInput').value = savedToken;
        }

        document.getElementById('pinterestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const tokenInput = document.getElementById('hfTokenInput').value.trim();
            const fileInput = document.getElementById('imageInput');
            const txtInput = document.getElementById('txtInput');
            const loadingText = document.getElementById('loadingText');
            const resultBox = document.getElementById('resultBox');
            
            if (!fileInput.files[0] || !txtInput.files[0] || !tokenInput) return;
            
            localStorage.setItem('hf_token_saved', tokenInput);
            
            loadingText.style.display = 'block';
            resultBox.style.display = 'none';
            loadingText.textContent = "Kapcsolódás az AI-hoz...";
            
            try {
                const promptText = await new Promise((resolve) => {
                    const txtReader = new FileReader();
                    txtReader.onload = (e) => resolve(e.target.result);
                    txtReader.readAsText(txtInput.files[0]);
                });

                const base64Image = await new Promise((resolve) => {
                    const imgReader = new FileReader();
                    imgReader.onload = (e) => resolve(e.target.result.split(',')[1]);
                    imgReader.readAsDataURL(fileInput.files[0]);
                });

                // ITT VAN A JAVÍTOTT, FIX URL:
                const response = await fetch('https://api-inference.huggingface.co/models/google/gemma-2-27b-it', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${tokenInput}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        inputs: `[Image: data:image/png;base64,${base64Image}] \n\n Utasítás: ${promptText}`
                    })
                });

                const data = await response.json();
                
                loadingText.style.display = 'none';
                resultBox.style.display = 'block';

                if (data.error) {
                    if (typeof data.error === 'string' && data.error.includes("loading")) {
                        resultBox.innerHTML = `<span style="color:orange;">Az AI szervere éppen most ébred fel. Kérlek várj 20 másodpercet, és nyomj újra a gombra!</span>`;
                    } else {
                        resultBox.innerHTML = `<span style="color:red;">Hiba: ${JSON.stringify(data.error)}</span>`;
                    }
                } else {
                    let aiText = data[0]?.generated_text || data.generated_text || JSON.stringify(data);
                    resultBox.textContent = aiText;
                }
                
            } catch (error) {
                loadingText.style.display = 'none';
                resultBox.style.display = 'block';
                resultBox.innerHTML = `<span style="color:red;">Hiba történt: ${error.message}</span>`;
            }
        });
    </script>
</body>
</html>
